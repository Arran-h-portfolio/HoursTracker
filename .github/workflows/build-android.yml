name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK
        run: dotnet publish TradeLedger/TradeLedger.csproj -f net10.0-android -c Release

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find TradeLedger/bin/Release/net10.0-android -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found. Listing bin output:"
            find TradeLedger/bin -type f | sort
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Publish to GitHub Releases
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest "${{ steps.apk.outputs.path }}" \
            --title "TradeLedger — Latest Build" \
            --notes "Latest Android APK built automatically from main.

          **To install:**
          1. Download the \`.apk\` file below
          2. Open it on your Android phone
          3. If prompted, enable 'Install from unknown sources' in Settings
          4. Tap Install" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
