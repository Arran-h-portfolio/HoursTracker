<?xml version="1.0" encoding="UTF-8"?>
<!--
  Splash screen SVG — rendered centred on a #4F46E5 indigo background (set in csproj).
  Layout: white badge coin (£ mark) centred slightly above midpoint,
  "TradeLedger" wordmark below, tagline below that.
  BaseSize="360,360" so the element renders large enough to be legible on all device sizes.
-->
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Logo mark ── -->

  <!-- White badge circle -->
  <circle cx="228" cy="182" r="100" fill="white"/>
  <!-- Subtle inner ring -->
  <circle cx="228" cy="182" r="100" fill="none" stroke="#C7D2FE" stroke-width="4"/>

  <!--
    £ symbol scaled to fit the smaller circle (r=100 vs r=150 in the app icon).
    Centre shifted from (228,228) → (228,182).
    Scale factor ≈ 0.667; strokes proportionally thinner.
  -->

  <!-- Curved stem -->
  <path d="M 215 236 L 215 172 Q 215 152 228 152 Q 241 152 244 166"
        stroke="#4F46E5" stroke-width="15" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle crossbar -->
  <line x1="199" y1="200" x2="261" y2="200"
        stroke="#4F46E5" stroke-width="15" stroke-linecap="round"/>

  <!-- Bottom bar -->
  <line x1="191" y1="236" x2="271" y2="236"
        stroke="#4F46E5" stroke-width="15" stroke-linecap="round"/>

  <!-- ── Wordmark ── -->
  <text x="228" y="322"
        font-family="sans-serif" font-weight="700" font-size="46"
        fill="white" text-anchor="middle" letter-spacing="1">TradeLedger</text>

  <!-- ── Tagline ── -->
  <text x="228" y="362"
        font-family="sans-serif" font-weight="400" font-size="20"
        fill="white" text-anchor="middle" opacity="0.72">Track your hours. Know your profit.</text>

</svg>
